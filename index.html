<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glam Earrings Shop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    :root {
      --pink: #ff4da6;
      --pink-dark: #e60073;
      --bg: #fff5f8;
      --text: #333;
    }

    body {
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: var(--pink);
      color: white;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: clamp(20px, 2.6vw, 28px);
      white-space: nowrap;
    }

    .cart {
      background: white;
      color: var(--pink);
      padding: 8px 14px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      border: 2px solid transparent;
    }

    .cart:focus-visible,
    button:focus-visible,
    input:focus-visible {
      outline: none;
      border-color: var(--pink-dark);
      box-shadow: 0 0 0 3px rgba(255, 77, 166, 0.25);
    }

    .container {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .top-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 16px 0 20px;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 220px;
      max-width: 420px;
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid #ffd0e7;
      border-radius: 24px;
      padding: 11px 16px;
      font-size: 14px;
      background: white;
      color: var(--text);
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
    }

    .card h3 {
      margin-top: 4px;
      font-size: 17px;
      min-height: 40px;
    }

    .price {
      color: var(--pink);
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    button {
      background: var(--pink);
      border: 2px solid transparent;
      color: white;
      padding: 10px 15px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s ease;
    }

    button:hover {
      background: var(--pink-dark);
    }

    .empty-state {
      text-align: center;
      background: white;
      border-radius: 12px;
      padding: 24px;
      color: #666;
    }

    .cart-panel {
      position: fixed;
      top: 0;
      right: -370px;
      width: min(340px, 90vw);
      height: 100%;
      background: white;
      box-shadow: -5px 0 15px rgba(0, 0, 0, 0.2);
      padding: 20px;
      transition: right 0.3s ease;
      overflow-y: auto;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .cart-panel.active {
      right: 0;
    }

    .cart-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .cart-item {
      margin-bottom: 12px;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .cart-item-name {
      font-size: 14px;
      font-weight: 600;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .qty-btn {
      padding: 4px 10px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1;
    }

    .qty-value {
      min-width: 24px;
      text-align: center;
      font-weight: 700;
      color: var(--pink-dark);
    }

    .total {
      margin-top: 8px;
      font-size: 18px;
      font-weight: bold;
      color: var(--pink);
    }

    .checkout-btn {
      width: 100%;
      margin-top: 8px;
      font-size: 15px;
      font-weight: 600;
    }

    .muted {
      color: #777;
      font-size: 13px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 16px;
      }

      .products {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .card {
        padding: 12px;
      }

      .card h3 {
        font-size: 15px;
        min-height: auto;
      }

      button {
        padding: 9px 12px;
        font-size: 13px;
      }
    }

    @media (max-width: 480px) {
      header {
        padding: 12px;
      }

      .top-controls {
        margin-top: 12px;
      }

      .products {
        grid-template-columns: 1fr;
      }

      .search-wrap {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>💎 Glam Earrings</h1>
    <div class="cart" role="button" tabindex="0" onclick="toggleCart()" onkeydown="handleCartKey(event)">
      Cart (<span id="cartCount">0</span>)
    </div>
  </header>

  <div class="container">
    <h2>Trending Earrings</h2>

    <div class="top-controls">
      <p class="muted">Find your sparkle with our latest styles.</p>
      <div class="search-wrap">
        <input type="search" id="searchInput" placeholder="Search earrings by name..." aria-label="Search earrings" />
      </div>
    </div>

    <div class="products" id="productList"></div>
  </div>

  <aside class="cart-panel" id="cartPanel" aria-label="Cart panel">
    <div class="cart-head">
      <h2>Your Cart</h2>
      <button type="button" onclick="toggleCart()">Close</button>
    </div>
    <div id="cartItems"></div>
    <div class="total">Total: ₹<span id="totalPrice">0</span></div>
    <button class="checkout-btn" type="button" onclick="checkout()">Checkout</button>
  </aside>

  <script>
    const products = [
      { id: 1, name: "Golden Hoop Earrings", price: 299, image: "https://images.unsplash.com/photo-1583391733956-6c78276477e2" },
      { id: 2, name: "Pearl Drop Earrings", price: 399, image: "https://images.unsplash.com/photo-1617038260897-41a1f14a8f3f" },
      { id: 3, name: "Diamond Stud Earrings", price: 499, image: "https://images.unsplash.com/photo-1622445275576-721325763afe" },
      { id: 4, name: "Boho Tassel Earrings", price: 249, image: "https://images.unsplash.com/photo-1608043152269-423dbba4e7e1" },
      { id: 5, name: "Rose Gold Spiral Hoops", price: 349, image: "https://images.unsplash.com/photo-1611652022419-a9419f74343d" },
      { id: 6, name: "Emerald Stone Danglers", price: 549, image: "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f" },
      { id: 7, name: "Silver Star Ear Cuffs", price: 279, image: "https://images.unsplash.com/photo-1635767798638-3e25273a8236" },
      { id: 8, name: "Vintage Chandbali Earrings", price: 629, image: "https://images.unsplash.com/photo-1611652022419-a9419f74343d" },
      { id: 9, name: "Crystal Fringe Drops", price: 459, image: "https://images.unsplash.com/photo-1598560917505-59a3ad559071" },
      { id: 10, name: "Minimal Bar Studs", price: 199, image: "https://images.unsplash.com/photo-1626126525134-fbbc07ddb721" }
    ];

    const cart = [];

    const productList = document.getElementById("productList");
    const searchInput = document.getElementById("searchInput");
    const cartItems = document.getElementById("cartItems");
    const cartCount = document.getElementById("cartCount");
    const totalPrice = document.getElementById("totalPrice");
    const cartPanel = document.getElementById("cartPanel");

    function renderProducts(list = products) {
      productList.innerHTML = "";

      if (!list.length) {
        productList.innerHTML = '<div class="empty-state">No earrings found. Try a different search.</div>';
        return;
      }

      list.forEach(product => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <img src="${product.image}" alt="${product.name}" loading="lazy" />
          <h3>${product.name}</h3>
          <div class="price">₹${product.price}</div>
          <button type="button" onclick="addToCart(${product.id})">Add to Cart</button>
        `;
        productList.appendChild(card);
      });
    }

    function addToCart(id) {
      const found = cart.find(item => item.id === id);

      if (found) {
        found.quantity += 1;
      } else {
        const product = products.find(p => p.id === id);
        cart.push({ ...product, quantity: 1 });
      }

      updateCart();
    }

    function changeQuantity(id, delta) {
      const item = cart.find(product => product.id === id);
      if (!item) {
        return;
      }

      item.quantity += delta;
      if (item.quantity <= 0) {
        const index = cart.findIndex(product => product.id === id);
        if (index > -1) {
          cart.splice(index, 1);
        }
      }

      updateCart();
    }

    function updateCart() {
      cartItems.innerHTML = "";
      let total = 0;
      let count = 0;

      if (!cart.length) {
        cartItems.innerHTML = '<p class="muted">Your cart is empty.</p>';
      }

      cart.forEach(item => {
        total += item.price * item.quantity;
        count += item.quantity;

        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
          <div>
            <div class="cart-item-name">${item.name}</div>
            <div class="muted">₹${item.price} each</div>
          </div>
          <div class="qty-controls">
            <button type="button" class="qty-btn" onclick="changeQuantity(${item.id}, -1)">-</button>
            <span class="qty-value">${item.quantity}</span>
            <button type="button" class="qty-btn" onclick="changeQuantity(${item.id}, 1)">+</button>
          </div>
        `;
        cartItems.appendChild(div);
      });

      cartCount.textContent = count;
      totalPrice.textContent = total;
    }

    function toggleCart() {
      cartPanel.classList.toggle("active");
    }

    function handleCartKey(event) {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        toggleCart();
      }
    }

    function checkout() {
      if (!cart.length) {
        alert("Your cart is empty. Add some earrings first!");
        return;
      }

      alert(`Thanks for shopping! Your total is ₹${totalPrice.textContent}.`);
    }

    function handleSearch() {
      const term = searchInput.value.trim().toLowerCase();
      const filtered = products.filter(product => product.name.toLowerCase().includes(term));
      renderProducts(filtered);
    }

    searchInput.addEventListener("input", handleSearch);

    renderProducts();
    updateCart();
  </script>
</body>
</html>
